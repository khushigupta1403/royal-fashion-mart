<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout 🛒 - Royal Fashion Mart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#333;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
color:white;
font-size:28px;
font-weight:600;
}

/* STEPS */
.steps{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
color:white;
}
.step{
padding:8px 15px;
border-radius:20px;
background:rgba(255,255,255,0.2);
}
.active{background:#fff;color:#333;font-weight:600}

/* MAIN CONTAINER */
.container{
max-width:1000px;
margin:auto;
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
}

/* TABLE */
table{width:100%;border-collapse:collapse;margin-bottom:20px;}
th,td{padding:12px;text-align:center;}
th{background:#667eea;color:white;border-radius:6px;}
tr:hover{background:#f5f5f5;}

img{width:60px;border-radius:8px}

/* INPUTS */
input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin:8px 0;
}

/* BUTTON */
.btn{
background:linear-gradient(90deg,#ff7e5f,#feb47b);
color:white;
border:none;
padding:14px;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}
.btn:hover{
transform:scale(1.05);
}

/* SUMMARY */
.summary{
background:#f7f7f7;
padding:15px;
border-radius:12px;
margin:15px 0;
}

/* MODAL */
.modal-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}
.modal{
background:white;
padding:25px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
animation:pop 0.4s ease;
}
@keyframes pop{
from{transform:scale(0.7);opacity:0}
to{transform:scale(1);opacity:1}
}

/* SUCCESS ANIMATION */
.success{
font-size:50px;
color:green;
animation:bounce 1s infinite alternate;
}
@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

.empty{text-align:center;color:white;font-size:20px;margin-top:50px;}

</style>
</head>

<body>

<div class="header">🛒 Checkout</div>

<div class="steps">
<div class="step active">Cart</div>
<div class="step">Address</div>
<div class="step">Payment</div>
<div class="step">Done</div>
</div>

<div class="container" id="app"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="success">✅</div>
    <h2>Confirm Order</h2>
    <div id="summary"></div>
    <button class="btn" onclick="confirmOrder()">Confirm ✅</button>
  </div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let discount = 0;
const shipping = 50;

function render(){
if(!cart.length){
document.getElementById("app").innerHTML="<div class='empty'>Cart is empty 😢</div>";
return;
}

let subtotal=0;
let html=`<table>
<tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th></tr>`;

cart.forEach((i,index)=>{
let total=i.price*(i.qty||1);
subtotal+=total;

html+=`
<tr>
<td><img src="${i.img}"><br>${i.name}</td>
<td>₹${i.price}</td>
<td><input type="number" value="${i.qty||1}" min="1" onchange="qty(${index},this.value)"></td>
<td>₹${total}</td>
</tr>`;
});

let final=subtotal+shipping-discount;

html+=`</table>

<input id="coupon" placeholder="Coupon code (TRY ROYAL10)">
<button class="btn" onclick="applyCoupon()">Apply Coupon</button>

<div class="summary">
Subtotal: ₹${subtotal}<br>
Shipping: ₹${shipping}<br>
Discount: ₹${discount}<br>
<b>Total: ₹${final}</b>
</div>

<h3>Delivery Details</h3>
<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<select id="payment">
<option>Cash on Delivery</option>
<option>UPI</option>
<option>Card</option>
</select>

<button class="btn" onclick="place()">Place Order 🚀</button>
`;

document.getElementById("app").innerHTML=html;
}

function qty(i,val){
cart[i].qty=parseInt(val);
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

function applyCoupon(){
let code=document.getElementById("coupon").value;
if(code==="ROYAL10"){
discount=100;
alert("Discount Applied 🎉");
}else{
discount=0;
alert("Invalid Coupon");
}
render();
}

function place(){
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let address=document.getElementById("address").value;

if(!name||!email||!address){
alert("Fill all details!");
return;
}

let total=cart.reduce((s,i)=>s+i.price*(i.qty||1),0)+shipping-discount;

document.getElementById("summary").innerHTML=`
<p><b>${name}</b></p>
<p>${email}</p>
<p>${address}</p>
<p>Total: ₹${total}</p>
`;

document.getElementById("modal").style.display="flex";
}

function confirmOrder(){

let orders = JSON.parse(localStorage.getItem("orders")) || [];

// CREATE ORDER
let newOrder = {
    id: Date.now(),
    items: cart,
    status: "Ordered",
    date: new Date().toLocaleString(),
    paymentType: document.getElementById("payment").value
};

// SAVE ORDER
orders.push(newOrder);
localStorage.setItem("orders", JSON.stringify(orders));

// CLEAR CART
localStorage.removeItem("cart");

// ✅ STORE FOR SUCCESS PAGE
localStorage.setItem("lastOrder", JSON.stringify(newOrder));

// 🔥 REDIRECT TO SUCCESS PAGE (IMPORTANT CHANGE)
window.location = "success.html";
}

render();

</script>

</body>
</html>
