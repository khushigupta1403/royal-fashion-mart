<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Royal Fashion Mart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;margin:0;background:#f5f5f5}

/* NAVBAR */
.navbar{
  background:#000;color:white;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
.navbar h2{margin:0;font-weight:600;}
.navbar a{color:white;margin:0 8px;text-decoration:none;font-weight:500;}
.navbar a:hover{text-decoration:underline;}
.navbar button{background:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;}
.nav-right{display:flex;align-items:center;gap:10px;}

/* SEARCH */
#searchBar{width:100%;padding:10px;margin:15px 0;}

/* CATEGORY */
.container {display:flex;overflow-x:auto;gap:10px;padding:10px;}
.container .card {min-width:120px;flex:0 0 auto;text-align:center;padding:15px;background:white;border-radius:10px;cursor:pointer;transition:0.3s;}
.container .card:hover{transform:scale(1.05);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:10px;}
.card img{width:100%;height:150px;object-fit:cover;border-radius:10px;cursor:pointer;transition:0.3s;}
.card img:hover{transform:scale(1.05);}
.card img:hover::after {content:"View Details";position:absolute;bottom:5px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:white;padding:4px 8px;border-radius:4px;font-size:12px;}

/* WISHLIST HEART */
.card {position:relative;}
.card .wish-btn{
  position:absolute;
  top:8px;
  right:8px;
  background:rgba(255,255,255,0.9);
  border:none;border-radius:50%;
  width:28px;height:28px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:0.3s;
}
.card .wish-btn.filled{color:red;}

/* BUTTONS BELOW IMAGE */
.card .buttons{display:flex;justify-content:space-between;margin-top:5px;}
.card .buttons button{
  flex:1;margin:0 2px;padding:5px;border:none;border-radius:4px;cursor:pointer;font-weight:600;font-size:12px;
  background:#666;color:white;transition:0.3s;
}
.card .buttons button:hover{background:#444;}

/* PRODUCT COUNT */
#productCount{padding:10px;font-weight:500;}

/* TOAST */
#toast{visibility:hidden;min-width:200px;background:#333;color:#fff;text-align:center;border-radius:6px;padding:10px;position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:9999;}
#toast.show{visibility:visible;}

/* DARK MODE */
.dark{background:#111;color:white}

/* RESPONSIVE */
@media(max-width:600px){
  .grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));}
  .card .buttons{flex-direction:column;}
  .card .buttons button{margin:3px 0;}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>Royal Fashion Mart</h2>
  <div class="nav-right">
    <a href="index.html">🏠 Home</a>
    <a href="cart.html">🛒 Cart <span id="cartBadge">0</span></a>
    <a href="wishlist.html">❤️ Wishlist <span id="wishBadge">0</span></a>
    <a href="order.html">📦 Orders</a>
    <a href="checkout.html">🧾 Checkout</a>
    <a href="ai.html">🤖 AI</a>
    <a href="chatbot.html">💬 Chat</a>
    <a href="login.html" id="loginBtn">👤 Login</a>
    <button onclick="toggleDark()">🌙</button>
  </div>
</div>

<!-- SEARCH & SORT -->
<div style="padding:15px; display:flex; gap:10px; flex-wrap:wrap;">
  <input id="search" placeholder="Search..." onkeyup="filterProducts()" style="flex:1;padding:10px">
  <select id="sort" onchange="sortProducts()" style="padding:10px;">
    <option value="">Sort By</option>
    <option value="low">Price: Low → High</option>
    <option value="high">Price: High → Low</option>
    <option value="az">Name: A → Z</option>
    <option value="za">Name: Z → A</option>
  </select>
</div>

<!-- CATEGORY -->
<div class="container">
  <div class="card" onclick="selectCategory('men')">👕 Men</div>
  <div class="card" onclick="selectCategory('women')">👗 Women</div>
  <div class="card" onclick="selectCategory('kids')">🧒 Kids</div>
  <div class="card" onclick="selectCategory('home decor')">🏠 Home Decor</div>
  <div class="card" onclick="selectCategory('care')">🧴 Care</div>
  <div class="card" onclick="selectCategory('grocery')">🛒 Grocery</div>
  <div class="card" onclick="showProducts(allProducts)">🔥 All</div>
</div>

<!-- PRODUCT COUNT -->
<div id="productCount"></div>

<!-- PRODUCTS -->
<div class="grid" id="products"></div>
<div id="toast"></div>

<script>
// PRODUCTS DATA
let allProducts=[
{name:"Men watch",price:1499,img:"https://i.ebayimg.com/images/g/Cu0AAeSwBEFn32ON/s-l1600.jpg",category:"men"},
{name:"Men Shirt",price:499,img:"https://tse3.mm.bing.net/th/id/OIP.KEegujPFGFBVXH4z_yMo-gHaJ3?pid=Api&P=0&h=180",category:"men"},
{name:"Men T-Shirt",price:500,img:"https://images.bewakoof.com/original/men-s-brown-oversized-t-shirt-546274-1664534735-1.jpg",category:"men"},
{name:"Men Shoes",price:999,img:"https://tse2.mm.bing.net/th/id/OIP.g13SMhS7ICpVmKBDYk73sQHaFm?pid=Api&P=0&h=180",category:"men"},
{name:"Women heels",price:1500,img:"https://i.pinimg.com/originals/7a/08/6e/7a086edab3c4fbf17df2d43b8fbf78bc.jpg",category:"women"},
{name:"Women Saree",price:1220,img:"https://tse1.mm.bing.net/th/id/OIP.kokJ3mud62vJ-sr_o38iUwHaLm?pid=Api&P=0&h=180",category:"women"},
{name:"Women Dress",price:1299,img:"https://tse2.mm.bing.net/th/id/OIP.vMv_eP05YwbOhwcooe9IOAHaLH?pid=Api&P=0&h=180",category:"women"},
{name:"Kids Dress",price:699,img:"https://www.handrlondon.com/product_image/1673454363566%20K%20FRONT.jpg",category:"kids"},
{name:"Kids Shoes",price:499,img:"https://tse1.mm.bing.net/th/id/OIP.YPPmrOG4voiNwLqU8YbTkgHaHa?pid=Api&P=0&h=180",category:"kids"},
{name:"Grocery Pack",price:299,img:"https://images.unsplash.com/photo-1542838132-92c53300491e",category:"grocery"},
{name:"Chocolates",price:299,img:"https://tse3.mm.bing.net/th/id/OIP.bgdAgDhG_kj1q6Z-7gI5bQHaFS?pid=Api&P=0&h=180",category:"grocery"},
{name:"Soft Drinks",price:400,img:"https://www.nicepng.com/png/detail/59-598830_cool-drinks-png-cold-drink-images-png.png",category:"grocery"},
{name:"Biscuits",price:100,img:"https://tse3.mm.bing.net/th/id/OIP.TWvi68xCEWhWRZtw2CByxAHaDY?pid=Api&P=0&h=180",category:"grocery"},
{name:"Oil",price:500,img:"https://tse3.mm.bing.net/th/id/OIP.AqfonX06cNrVYpkyPIfMnQHaHa?pid=Api&P=0&h=180",category:"grocery"},
{name:"Handbag",price:1500,img:"https://m.media-amazon.com/images/I/81tVcnHMrSL._AC_SL1500_.jpg",category:"accessories"},
{name:"Sunglasses",price:999,img:"https://tse1.mm.bing.net/th/id/OIP.1scVlD3-D2HDV5NkSo0DHgHaE8?pid=Api&P=0&h=180",category:"accessories"},
{name:"Wallet",price:1200,img:"https://tse1.mm.bing.net/th/id/OIP.hKmIdI_mFDreu0sQ9UjkYgHaHP?pid=Api&P=0&h=180",category:"accessories"},
{name:"Phone Cover",price:400,img:"https://tse3.mm.bing.net/th/id/OIP.HG3sNkul80Qg0A3XuwiVKAHaJ3?pid=Api&P=0&h=180",category:"accessories"},
{name:"Earings",price:400,img:"https://tse4.mm.bing.net/th/id/OIP.arZJ9NXBRL8kZA2yZG-ViwHaHa?pid=Api&P=0&h=180",category:"accessories"},
{name:"Face Wash",price:199,img:"https://tse2.mm.bing.net/th/id/OIP.woDNn_b7Wgm7zWh1YFXrFgHaHZ?pid=Api&P=0&h=180",category:"care"},
{name:"Perfume",price:800,img:"https://cdn.pixabay.com/photo/2017/03/14/11/41/perfume-2142824_1280.jpg",category:"care"},
{name:"Suncreen",price:600,img:"https://tse2.mm.bing.net/th/id/OIP.LVFnMvo62OAge3VSafIMoQHaHa?pid=Api&P=0&h=180",category:"care"},
{name:"Body Wash",price:500,img:"https://cdn01.pharmeasy.in/dam/products_otc/S43740/nivea-shower-gel-water-lily-oil-body-wash-250ml-2-1679373740.jpg",category:"care"},
{name:"Lamp",price:1900,img:"https://homeblitz.in/cdn/shop/articles/Table-Lamp-mb.png?v=1694030390",category:"home decor"},
{name:"Plants Vase",price:1000,img:"https://m.media-amazon.com/images/I/71cP9TsX9oL._AC_.jpg",category:"home decor"},
{name:"Lights",price:2000,img:"https://tse3.mm.bing.net/th/id/OIP.Lv6YGjpey8wXAAXk4Vvb-QHaJQ?pid=Api&P=0&h=180",category:"home decor"},
{name:"Wall Hanging",price:600,img:"http://nestasia.in/cdn/shop/files/Wallhanging_2_d30dfc6e-a01b-49d3-b8f3-7f75e064f779.webp?v=1697548096",category:"home decor"}
];

// STORAGE
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let user = JSON.parse(localStorage.getItem("user") || null);

// SHOW PRODUCTS
function showProducts(products){
  let html="";
  products.forEach(p=>{
    let data = encodeURIComponent(JSON.stringify(p));
    let filled = wishlist.some(w=>w.name===p.name) ? "filled" : "";
    html+=`
    <div class="card">
      <img src="${p.img}" onclick='viewDetails("${data}")' title="View Details">
      <button class="wish-btn ${filled}" onclick='toggleWish("${data}", this);event.stopPropagation()'>❤️</button>
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <div class="buttons">
        <button onclick='addCart("${data}")'>Add Cart</button>
        <button onclick='buyNow("${data}")'>Buy Now</button>
      </div>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
  document.getElementById("productCount").innerText=`${products.length} Products Found`;
}

// WISHLIST TOGGLE
function toggleWish(data, btn){
  let p=JSON.parse(decodeURIComponent(data));
  let index = wishlist.findIndex(w=>w.name===p.name);
  if(index>-1){
    wishlist.splice(index,1);
    btn.classList.remove("filled");
    showToast("Removed from Wishlist ❌");
  } else{
    wishlist.push(p);
    btn.classList.add("filled");
    showToast("Added to Wishlist ❤️");
  }
  localStorage.setItem("wishlist",JSON.stringify(wishlist));
  updateBadges();
}

// OTHER FUNCTIONS
function viewDetails(data){ let p=JSON.parse(decodeURIComponent(data)); localStorage.setItem("product",JSON.stringify(p)); window.location.href="product-details.html";}
function addCart(data){ let p=JSON.parse(decodeURIComponent(data)); cart.push(p); localStorage.setItem("cart",JSON.stringify(cart)); showToast("Added to Cart ✅"); updateBadges();}
function buyNow(data){ let p=JSON.parse(decodeURIComponent(data)); localStorage.setItem("cart",JSON.stringify([p])); window.location.href="checkout.html";}
function filterProducts(){ let val=search.value.toLowerCase(); showProducts(allProducts.filter(p=>p.name.toLowerCase().includes(val)));}
function selectCategory(cat){ showProducts(allProducts.filter(p=>p.category===cat));}
function sortProducts(){
  let val=sort.value;
  let products = Array.from(allProducts);
  if(val==="low") products.sort((a,b)=>a.price-b.price);
  else if(val==="high") products.sort((a,b)=>b.price-a.price);
  else if(val==="az") products.sort((a,b)=>a.name.localeCompare(b.name));
  else if(val==="za") products.sort((a,b)=>b.name.localeCompare(a.name));
  showProducts(products);
}
function toggleDark(){document.body.classList.toggle("dark");}
function updateBadges(){cartBadge.innerText=cart.length; wishBadge.innerText=wishlist.length;}
function showToast(msg){toast.innerText=msg; toast.className="show"; setTimeout(()=>toast.className="",2000);}
if(user){ loginBtn.innerHTML=`👤 ${user.name||"User"}`; loginBtn.href="profile.html";}

showProducts(allProducts);
updateBadges();
</script>
</body>
</html>
