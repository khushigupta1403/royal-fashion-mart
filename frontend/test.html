<!DOCTYPE html>
<html>
<body>

<h2>AI Detect Test</h2>

<button onclick="testAI()">Test AI</button>

<script>
function testAI() {
  fetch("http://localhost:9090/detect", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      imageUrl: "https://images.unsplash.com/photo-1521334884684-d80222895322"
    })
  })
  .then(res => res.json())
  .then(data => {
    console.log("AI RESULT:", data);
    alert(JSON.stringify(data));
  });
}
</script>

</body>
</html>
