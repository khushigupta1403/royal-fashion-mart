<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - Royal Fashion Mart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
    color:#333;
}

/* HEADER */
.header{
    text-align:center;
    color:white;
    font-size:30px;
    font-weight:600;
}

/* SUMMARY */
.summary{
    display:flex;
    justify-content:space-around;
    margin:20px 0;
    color:white;
}
.summary div{
    background:rgba(255,255,255,0.2);
    padding:10px 20px;
    border-radius:12px;
}

/* SEARCH */
.search{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    margin-bottom:15px;
}

/* TABS */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}
.tabs button{
    padding:8px 16px;
    border:none;
    border-radius:20px;
    background:rgba(255,255,255,0.2);
    color:white;
    cursor:pointer;
}
.tabs button.active{
    background:white;
    color:#333;
}

/* ORDER CARD */
.container{
    max-width:1000px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:20px;
}
.order-card{
    background:rgba(255,255,255,0.95);
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    transition:0.3s;
}
.order-card:hover{
    transform:translateY(-8px);
}

/* STATUS */
.status{
    padding:6px 14px;
    border-radius:20px;
    color:white;
    font-size:12px;
}
.Placed{background:#3498db;}
.Pending{background:#9b59b6;}
.Shipped{background:#f1c40f;}
.OutforDelivery{background:#e67e22;}
.Delivered{background:#27ae60;}
.Cancelled{background:#e74c3c;}

.items{
    display:flex;
    gap:12px;
    overflow-x:auto;
    margin-top:15px;
}
.item{
    min-width:150px;
    background:#fff;
    padding:12px;
    border-radius:12px;
    text-align:center;
}
.item img{
    width:80px;
}

/* BUTTONS */
.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}
button{
    border:none;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
    color:white;
}
.track{background:#27ae60;}
.reorder{background:#f39c12;}
.invoice{background:#3498db;}
.cancel{background:#e74c3c;}

.empty{
    text-align:center;
    color:white;
    margin-top:50px;
}

/* TOAST */
#toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#333;
    color:white;
    padding:10px 20px;
    border-radius:10px;
    display:none;
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}
.popup-box{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">📦 My Orders</div>

<!-- SUMMARY -->
<div class="summary">
    <div id="totalOrders">Orders: 0</div>
    <div id="activeOrders">Active: 0</div>
    <div id="deliveredOrders">Delivered: 0</div>
</div>

<!-- SEARCH -->
<input class="search" placeholder="Search Order ID..." oninput="searchOrder(this.value)">

<!-- TABS -->
<div class="tabs">
<button class="active" onclick="filterOrders('All')">All</button>
<button onclick="filterOrders('Active')">Active</button>
<button onclick="filterOrders('Delivered')">Delivered</button>
<button onclick="filterOrders('Cancelled')">Cancelled</button>
</div>

<div class="container" id="container"></div>

<div id="toast"></div>

<div class="popup" id="popup">
<div class="popup-box" id="popupContent"></div>
</div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];
const container = document.getElementById("container");

// URL filter
const params = new URLSearchParams(window.location.search);
const orderId = params.get('id');

// Toast
function showToast(msg){
    let t=document.getElementById("toast");
    t.innerText=msg;
    t.style.display="block";
    setTimeout(()=>t.style.display="none",2000);
}

// Summary
function loadSummary(){
    document.getElementById("totalOrders").innerText="Orders: "+orders.length;
    document.getElementById("activeOrders").innerText="Active: "+orders.filter(o=>!["Delivered","Cancelled"].includes(o.status)).length;
    document.getElementById("deliveredOrders").innerText="Delivered: "+orders.filter(o=>o.status==="Delivered").length;
}

// Render
function loadOrders(data=orders){
    if(orderId){
        const single = data.find(o=>o.id==orderId);
        if(single) data=[single];
    }

    if(!data.length){
        container.innerHTML="<div class='empty'>No Orders 😢</div>";
        return;
    }

    let html="";
    data.forEach(o=>{
        let total=0;
        o.items.forEach(i=> total+=i.price*(i.qty||1));

        html+=`
        <div class="order-card">
            <b>Order #${o.id}</b>
            <span class="status ${o.status}">${o.status}</span>

            <div class="items">
                ${o.items.map(i=>`
                <div class="item">
                    <img src="${i.img}">
                    <p>${i.name}</p>
                    <p>₹${i.price}</p>
                </div>`).join("")}
            </div>

            <p><b>Total:</b> ₹${total}</p>

            <div class="actions">
                <button class="track" onclick="track(${o.id})">Track</button>
                <button class="reorder" onclick="reorder(${o.id})">Reorder</button>
                <button class="invoice" onclick="invoice(${o.id})">Invoice</button>
                <button class="cancel" onclick="cancelOrder(${o.id})">Cancel</button>
            </div>
        </div>`;
    });

    container.innerHTML=html;
    loadSummary();
}

// Search
function searchOrder(val){
    let f = orders.filter(o=>o.id.toString().includes(val));
    loadOrders(f);
}

// ✅ FIXED TRACK FUNCTION
function track(id){
    // Save ID for tracking page
    localStorage.setItem("trackOrderId", id);

    // Redirect with ID
    window.location.href = "track.html?id=" + id;
}

// Other actions
function reorder(id){ showToast("Reordered!"); }

function invoice(id){
    let o=orders.find(x=>x.id===id);
    let text=`Invoice\nOrder #${o.id}\nTotal: ₹${o.items.reduce((s,i)=>s+i.price,0)}`;
    let blob=new Blob([text],{type:"text/plain"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="invoice.txt";
    a.click();
}

function cancelOrder(id){
    let o=orders.find(x=>x.id===id);
    o.status="Cancelled";
    localStorage.setItem("orders",JSON.stringify(orders));
    showToast("Order Cancelled");
    loadOrders();
}

// Filter
function filterOrders(type){
    document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");

    if(type==="All") loadOrders();
    else if(type==="Active") loadOrders(orders.filter(o=>!["Delivered","Cancelled"].includes(o.status)));
    else loadOrders(orders.filter(o=>o.status===type));
}

// LIVE SYNC
window.addEventListener("storage", ()=>{
    orders = JSON.parse(localStorage.getItem("orders")) || [];
    loadOrders();
});

// Init
loadOrders();
</script>

</body>
</html>
