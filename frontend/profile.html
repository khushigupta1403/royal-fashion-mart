<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
}

/* Navbar */
.navbar {
  width: 100%;
  background: rgba(0,0,0,0.9);
  color: #fff;
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
  text-align: center;
  letter-spacing: 1px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Main container */
.container {
  width: 90%;
  max-width: 900px;
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
}

/* Card styling */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 20px;
  width: 100%;
  color: #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* Button */
button {
  padding: 12px 25px;
  background: linear-gradient(90deg, #ff6ec4, #7873f5);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* Orders section */
#orders {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  width: 100%;
}

.order-card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 15px;
  width: calc(33% - 10px);
  text-align: center;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transition: transform 0.3s, box-shadow 0.3s;
}

.order-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

/* Summary info */
.summary {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 15px;
  border-radius: 20px;
  width: 100%;
  text-align: center;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

@media screen and (max-width: 768px) {
  .order-card {
    width: calc(50% - 10px);
  }
}

@media screen and (max-width: 500px) {
  .order-card {
    width: 100%;
  }
}
</style>

</head>

<body>

<div class="navbar">Profile 👤</div>

<div class="container">

<div id="user"></div>

<div class="summary" id="summary"></div>

<h3>Orders 📦</h3>
<div id="orders"></div>

<button onclick="logout()">Logout</button>

</div>

<script>
let user = localStorage.getItem("token");

if(!user){
  alert("Please login first");
  window.location="login.html";
}

let orders = JSON.parse(localStorage.getItem("orders")) || [];

document.getElementById("user").innerHTML =
`<div class="card"><h2>Welcome, ${user}</h2></div>`;

// Filter user orders
let myOrders = orders.filter(o => o.user === user);

// Show summary: count and total
let total = myOrders.reduce((sum,o)=>sum+o.price,0);
document.getElementById("summary").innerHTML =
`<p>Total Orders: ${myOrders.length} | Total Amount: ₹${total}</p>`;

// Display orders
let html="";
myOrders.forEach(o=>{
  html+=`<div class="order-card">₹${o.price}</div>`;
});
document.getElementById("orders").innerHTML = html;

function logout(){
  localStorage.removeItem("token");
  window.location="index.html";
}
</script>

</body>
</html>
