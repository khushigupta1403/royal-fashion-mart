<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Floating background particles */
    body::before, body::after {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      animation: float 12s infinite alternate;
      z-index: 0;
    }

    body::after {
      width: 500px;
      height: 500px;
      animation-delay: 6s;
    }

    @keyframes float {
      0% { transform: translateY(0) translateX(0) rotate(0deg);}
      100% { transform: translateY(50px) translateX(50px) rotate(45deg);}
    }

    .box {
      position: relative;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      padding: 40px 30px;
      border-radius: 25px;
      width: 340px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      color: #fff;
      z-index: 1;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .box:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 30px;
      font-size: 28px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 15px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: #ddd;
    }

    input:focus {
      background: rgba(255,255,255,0.3);
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #ff6ec4, #7873f5);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 0 20px rgba(255,110,196,0.5), 0 0 40px rgba(120,115,245,0.5);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255,110,196,0.7), 0 0 50px rgba(120,115,245,0.7);
    }

    #msg {
      margin-top: 18px;
      font-weight: 600;
      min-height: 20px;
      transition: all 0.3s ease;
    }

    p {
      margin-top: 25px;
      font-size: 14px;
      color: #fff;
    }

    p a {
      color: #ffd700;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    p a:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Register</h2>

  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Register</button>

  <p id="msg"></p>

  <p>Already have account? <a href="login.html">Login</a></p>
</div>

<script>
async function register() {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    // ✅ validation
    if (!name || !email || !password) {
        msg.style.color = "red";
        msg.innerText = "All fields are required ❌";
        return;
    }

    try {
        const res = await fetch("http://localhost:8080/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, email, password })
        });

        // ✅ safe response handling
        const text = await res.text();
        let data;

        try {
            data = JSON.parse(text);
        } catch {
            data = { message: text };
        }

        if (res.ok) {
            msg.style.color = "green";
            msg.innerText = data.message || "Registered successfully ✅";

            // redirect to login
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);

        } else {
            msg.style.color = "red";
            msg.innerText = data.message || "Registration failed ❌";
        }

    } catch (error) {
        msg.style.color = "red";
        msg.innerText = "Server not responding ❌";
    }
}
</script>

</body>
</html>
