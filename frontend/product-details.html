<!DOCTYPE html>
<html>
<head>
<title>Product Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

body{
  font-family:Poppins;
  background:#f0f2f5;
  margin:0;
}

/* NAVBAR */
.navbar{
  background:#111;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:600;
}

/* MAIN CONTAINER */
.container{
  max-width:900px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* PRODUCT SECTION */
.product-box{
  display:flex;
  gap:25px;
  flex-wrap:wrap;
  align-items:center;
}

.product-box img{
  width:250px;
  height:250px;
  object-fit:cover;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  transition:0.3s;
}

.product-box img:hover{
  transform:scale(1.08);
}

/* INFO */
.info{
  flex:1;
}

.info h2{
  margin:0;
  color:#333;
}

.info p{
  color:#666;
}

/* FORM */
input,textarea,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-family:Poppins;
}

/* BUTTON */
button{
  padding:12px;
  width:100%;
  border:none;
  background:linear-gradient(45deg,#ff6b6b,#ff3b3b);
  color:white;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* REVIEWS */
.review{
  background:#fafafa;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  border-left:5px solid #ff6b6b;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.review b{
  color:#333;
}

.review small{
  color:#888;
}

.stars{
  color:#ffbc00;
  font-size:18px;
}

/* RESPONSIVE */
@media(max-width:600px){
  .product-box{
    flex-direction:column;
    text-align:center;
  }
}

</style>
</head>

<body>

<div class="navbar">
🛍 Product Details
</div>

<div class="container">

<div class="product-box">
  <img id="img">
  
  <div class="info">
    <h2 id="name"></h2>
    <p id="desc"></p>
  </div>
</div>

<hr>

<h3>✍ Add Review</h3>

<input id="user" placeholder="Your Name">
<textarea id="text" placeholder="Write your review"></textarea>

<select id="rate">
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Bad</option>
</select>

<button onclick="add()">Submit Review</button>

<h3>⭐ Customer Reviews</h3>
<div id="reviews"></div>

</div>

<script>

// GET PRODUCT FROM LOCALSTORAGE
let p = JSON.parse(localStorage.getItem("product"));

if(!p){
 document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px'>❌ No product selected!</h2>";
}

// SHOW DATA
document.getElementById("name").innerText = p.name;
document.getElementById("img").src = p.img;
document.getElementById("desc").innerText = p.description || "High quality product.";

// REVIEWS STORAGE
let all = JSON.parse(localStorage.getItem("reviews")) || {};

// ADD REVIEW
function add(){

 let name = document.getElementById("user").value || "User";
 let text = document.getElementById("text").value;
 let rate = document.getElementById("rate").value;

 if(!text){
   alert("Write review");
   return;
 }

 if(!all[p.name]) all[p.name]=[];

 all[p.name].push({
   name,
   text,
   rate,
   date:new Date().toLocaleString()
 });

 localStorage.setItem("reviews", JSON.stringify(all));

 document.getElementById("text").value="";
 document.getElementById("user").value="";

 load();
}

// LOAD REVIEWS
function load(){

 let list = all[p.name] || [];
 let html="";

 list.slice().reverse().forEach(r=>{

  let stars = "★".repeat(r.rate) + "☆".repeat(5-r.rate);

  html+=`
  <div class="review">
    <b>${r.name}</b> <small>(${r.date})</small><br>
    <span class="stars">${stars}</span>
    <p>${r.text}</p>
  </div>`;
 });

 document.getElementById("reviews").innerHTML = html;
}

load();

</script>

</body>
</html>
