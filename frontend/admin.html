<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard 📊</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#f4f6f8}

/* HEADER */
.header{
  background: linear-gradient(90deg,#1abc9c,#16a085);
  color:white;
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* SEARCH */
.search{
  margin:20px;
  padding:10px;
  width:calc(100% - 60px);
  border-radius:8px;
  border:1px solid #ccc;
}

/* ORDERS */
.order{
  background:white;
  margin:10px 20px;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.badge{
  padding:5px 10px;
  border-radius:10px;
  color:white;
  font-size:12px;
}

.Placed{background:#3498db;}
.Packed{background:#9b59b6;}
.Shipped{background:#f1c40f;color:black;}
.OutforDelivery{background:#e67e22;}
.Delivered{background:#27ae60;}
.Cancelled{background:#e74c3c;}

select{
  padding:6px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="header">📊 Admin Dashboard</div>

<div class="dashboard">
  <div class="card" id="stats"></div>
  <div class="card">
    <h3>⚡ Actions</h3>
    <button onclick="loadOrders()">🔄 Refresh</button>
  </div>
</div>

<input class="search" placeholder="Search Order ID..." oninput="searchOrder(this.value)">

<h3 style="padding-left:20px;">📦 Orders</h3>
<div id="orders"></div>

<script>

// =======================
// LOAD DATA
// =======================
let orders = JSON.parse(localStorage.getItem("orders")) || [];

// =======================
// STATS
// =======================
function loadStats(){
  let total = orders.length;
  let revenue = 0;

  orders.forEach(o=>{
    o.items.forEach(i=>{
      revenue += i.price * (i.qty || 1);
    });
  });

  document.getElementById("stats").innerHTML=`
    <h3>Total Orders: ${total}</h3>
    <h3>Total Revenue: ₹${revenue}</h3>
  `;
}

// =======================
// RENDER ORDERS
// =======================
function renderOrders(data){
  let html="";

  data.forEach(o=>{
    let total = o.items.reduce((s,i)=>s+i.price*(i.qty||1),0);

    html+=`
    <div class="order">
      <b>Order #${o.id}</b><br>
      💰 ₹${total}<br>
      📌 <span class="badge ${o.status}">${o.status}</span><br><br>

      <select onchange="updateStatus(${o.id},this.value)">
        <option ${o.status==="Placed"?"selected":""}>Placed</option>
        <option ${o.status==="Packed"?"selected":""}>Packed</option>
        <option ${o.status==="Shipped"?"selected":""}>Shipped</option>
        <option ${o.status==="OutforDelivery"?"selected":""}>OutforDelivery</option>
        <option ${o.status==="Delivered"?"selected":""}>Delivered</option>
        <option ${o.status==="Cancelled"?"selected":""}>Cancelled</option>
      </select>
    </div>`;
  });

  document.getElementById("orders").innerHTML = html;
}

// =======================
// SEARCH
// =======================
function searchOrder(val){
  let f = orders.filter(o=>o.id.toString().includes(val));
  renderOrders(f);
}

// =======================
// UPDATE STATUS
// =======================
function updateStatus(id,status){
  let o = orders.find(x=>x.id===id);
  o.status = status;

  localStorage.setItem("orders",JSON.stringify(orders));

  alert("✅ Status Updated");
  loadOrders();
}

// =======================
// LOAD
// =======================
function loadOrders(){
  orders = JSON.parse(localStorage.getItem("orders")) || [];
  loadStats();
  renderOrders(orders);
}

// =======================
// LIVE SYNC
// =======================
window.addEventListener("storage", ()=>{
  loadOrders();
});

// INIT
loadOrders();

</script>

</body>
</html>
