<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Detection Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

/* BODY */
body{
  min-height:100vh;
  background: linear-gradient(135deg,#1e293b,#0f172a);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:30px;
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0; left:0; right:0;
  height:60px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:700;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  z-index:10;
  color:#f8fafc;
}

/* MAIN CONTAINER */
.container{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(25px);
  border-radius:30px;
  padding:40px 30px;
  max-width:500px;
  width:100%;
  margin-top:100px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  animation:fadeIn 0.6s ease;
}

/* Animations */
@keyframes fadeIn{from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);}}

/* UPLOAD BOX */
.upload-box h3{
  margin-bottom:20px;
  font-weight:600;
  font-size:22px;
  color:#f8fafc;
}
input[type="file"]{
  width:100%;
  padding:14px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,0.15);
  color:white;
  font-weight:500;
  transition:0.3s;
}
input[type="file"]:hover{
  background:rgba(255,255,255,0.3);
}

/* IMAGE PREVIEW */
#preview{
  margin-top:20px;
  width:100%;
  border-radius:25px;
  box-shadow:0 10px 40px rgba(0,0,0,0.7);
  transition:0.4s;
  transform-origin:center;
}
#preview:hover{
  transform: scale(1.03);
}

/* LOADER */
.loader{
  margin-top:15px;
  font-size:14px;
  color:#60a5fa;
  font-weight:600;
  animation:blink 1s infinite;
}
@keyframes blink{0%,100%{opacity:1;} 50%{opacity:0.3;}}

/* RESULTS */
.results-list{
  margin-top:20px;
  text-align:left;
}
.result-item{
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  padding:15px 20px;
  margin-bottom:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
  transition:0.3s;
}
.result-item:hover{
  background:rgba(34,197,94,0.15);
  transform:translateY(-5px);
}
.result-item h4{
  font-size:16px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
}
.progress-bar{
  height:14px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  overflow:hidden;
}
.progress-fill{
  height:100%;
  border-radius:10px;
  background: linear-gradient(90deg,#22c55e,#16a34a);
  width:0;
  transition:width 1s ease;
}

/* NEON EFFECT FOR TOP */
.neon{
  text-shadow:
     0 0 5px #60a5fa,
     0 0 10px #60a5fa,
     0 0 20px #3b82f6,
     0 0 40px #2563eb;
}
</style>
</head>

<body>

<div class="navbar neon">🤖 AI Detection Dashboard</div>

<div class="container">

  <div class="upload-box">
    <h3 class="neon">Upload Image for Detection</h3>
    <input type="file" id="file" accept="image/*">
    <img id="preview" style="display:none;">
    <div class="loader" id="loading"></div>
    <div class="results-list" id="results"></div>
  </div>

</div>

<script>
let model;
let loaded=false;

// Load model
mobilenet.load().then(m=>{
  model=m;
  loaded=true;
  console.log("Model loaded ✅");
});

// File upload
document.getElementById("file").addEventListener("change", async function(){
  let file=this.files[0];
  if(!file) return;

  let img=document.getElementById("preview");
  img.src=URL.createObjectURL(file);
  img.style.display="block";

  document.getElementById("results").innerHTML="";
  document.getElementById("loading").innerText="🔍 Analyzing image...";

  setTimeout(async ()=>{
    if(!loaded){
      document.getElementById("loading").innerText="Loading model...";
      return;
    }

    let predictions = await model.classify(img);
    document.getElementById("loading").innerText="";

    // Show top 5 predictions
    let html="";
    predictions.slice(0,5).forEach(p=>{
      html+=`
        <div class="result-item">
          <h4>${p.className} <span>${(p.probability*100).toFixed(2)}%</span></h4>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${(p.probability*100).toFixed(2)}%"></div>
          </div>
        </div>
      `;
    });
    document.getElementById("results").innerHTML=html;

  },800);

});
</script>

</body>
</html>
