# ===============================
# DATABASE (H2 - for local testing)
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# H2 Console (optional)
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# SERVER PORT
# ===============================
# Use Render PORT if exists, otherwise default to 8080 for local
server.port=${PORT:8080}

# ===============================
# API KEY
# ===============================
# Local: your real key
# Render: it will read from environment variable OPENROUTER_API_KEY if set
openrouter.api.key=${OPENROUTER_API_KEY:YOUR_REAL_KEY_HERE}