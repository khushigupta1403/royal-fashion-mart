<!DOCTYPE html>
<html>
<head>
<title>Products - Royal Fashion Mart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(to right,#f8f9fa,#eef2f7);
}

/* NAVBAR */
.navbar{
  background:#111;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.navbar h2{
  margin:0;
  font-weight:600;
}

.navbar span{
  color:#ff6b6b;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:25px;
}

/* CARD */
.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.3s;
  position:relative;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* IMAGE */
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  cursor:pointer;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.05);
}

/* CONTENT */
.card h3{
  margin:10px;
  font-size:16px;
  color:#333;
}

.card p{
  margin:0 10px;
  font-weight:600;
  color:#ff6b6b;
  font-size:18px;
}

/* BUTTON */
.card button{
  margin:10px;
  width:calc(100% - 20px);
  padding:10px;
  border:none;
  background:linear-gradient(45deg,#ff6b6b,#ff3b3b);
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.card button:hover{
  background:linear-gradient(45deg,#ff3b3b,#ff1f1f);
  transform:scale(1.03);
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#ff6b6b;
  color:white;
  padding:4px 8px;
  font-size:12px;
  border-radius:5px;
}

/* RESPONSIVE */
@media(max-width:600px){
  .navbar{
    flex-direction:column;
    gap:10px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

// RENDER
let html = "";

products.forEach(p=>{
  let data = encodeURIComponent(JSON.stringify(p));

  html += `
  <div class="card">
    <div class="badge">New</div>
    <img src="${p.img}" onclick='goToDetails("${data}")'>
    <h3>${p.name}</h3>
    <p>₹${p.price}</p>
    <button onclick='goToDetails("${data}")'>View Details</button>
  </div>
  `;
});

document.getElementById("products").innerHTML = html;


// SAME FUNCTION (NO CHANGE)
function goToDetails(data){
  let p = JSON.parse(decodeURIComponent(data));

  localStorage.setItem("product", JSON.stringify({
    name: p.name,
    price: p.price,
    img: p.img,
    description: p.name
  }));

  window.location.href = "product-details.html";
}

</script>
